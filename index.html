<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OjaLive - Live Market Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--earth:#C4612A;--earth-lt:#F0A06A;--dark:#1A1208;--card:#FEFCF8;--muted:#7A6A55;--border:#E8DFD0;--green:#2D7A4F;--red:#C0392B;--amber:#D4A017;--bg:#F7F2EA;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);font-size:15px;}
.topbar{background:var(--dark);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}.logo span{color:var(--earth-lt);}
.tabs{display:flex;background:var(--dark);padding:0 16px 14px;gap:8px;}
.tab{flex:1;padding:10px 0;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#2E2415;color:#A08060;}
.tab.active{background:var(--earth);color:#fff;}
.screen{display:none;padding:16px;}.screen.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.price-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.price-item:last-child{border-bottom:none;}
.mname{font-weight:600;font-size:14px;}.munit{font-size:11px;color:var(--muted);margin-top:2px;}
.pright{text-align:right;}.pval{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--earth);}
.pbadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block;}
.stable{background:#FDF6E3;color:var(--amber);}
.vdot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:4px;}
.hero{background:linear-gradient(135deg,var(--dark),#3D2810);border-radius:16px;padding:20px;color:#fff;margin-bottom:14px;}
.hlabel{font-size:11px;color:var(--earth-lt);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hval{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin:6px 0;}
.hsub{font-size:12px;color:#C0A880;}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:25px;font-size:13px;z-index:999;transition:transform .3s;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Oja<span>Live</span></div>
  <div style="background:var(--earth);color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;">OjaLive v2.0</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('buyer')">Buy</button>
  <button class="tab" onclick="switchTab('supplier')">Sell</button>
  <button class="tab" onclick="switchTab('ai')">AI</button>
  <button class="tab" onclick="switchTab('admin')">Admin</button>
</div>

<div class="toast" id="toast"></div>

<div class="screen active" id="screen-buyer">
  <div class="hero">
    <div class="hlabel">Live Market Prices</div>
    <div class="hval" id="count">0 Listings</div>
    <div class="hsub">Loading...</div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
      <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;">Live Prices</div>
    </div>
    <div id="board"><div class="empty">Loading prices...</div></div>
  </div>
</div>

<div class="screen" id="screen-supplier"><div style="text-align:center;padding:40px;color:var(--muted);">Seller Portal - Coming Soon</div></div>
<div class="screen" id="screen-ai"><div style="text-align:center;padding:40px;color:var(--muted);">AI Tools - Coming Soon</div></div>
<div class="screen" id="screen-admin"><div style="text-align:center;padding:40px;color:var(--muted);">Admin Panel - Coming Soon</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ivxtmhojrwxfsfblqtcv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2eHRtaG9qcnd4ZnNmYmxxdGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDA4NjksImV4cCI6MjA5Nzc3Njg2OX0.hnYsiqkLwnFlo4ZZD9iGbotphOh1lvlr_31sBkds2eM";
let db;

function switchTab(tab) {
  ['buyer','supplier','ai','admin'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('screen-'+t).classList.toggle('active', t===tab);
  });
}

function showToast(msg) {
  document.getElementById('toast').textContent = msg;
  document.getElementById('toast').classList.add('show');
  setTimeout(function() { document.getElementById('toast').classList.remove('show'); }, 3000);
}

function initDB() {
  const { createClient } = window.supabase;
  db = createClient(SUPABASE_URL, SUPABASE_KEY);
  loadListings();
}

async function loadListings() {
  try {
    var result = await db.from('Listing').select('*').eq('verified', true);
    if (result.error) { showToast('Error: '+result.error.message); return; }
    var data = result.data || [];
    document.getElementById('count').textContent = data.length + ' Listings';
    if (!data.length) { document.getElementById('board').innerHTML = '<div class="empty">No listings</div>'; return; }
    document.getElementById('board').innerHTML = data.map(function(item) {
      return '<div class="price-item"><div><div class="mname">'+item.name+'</div><div class="munit">'+item.unit+' · <span class="vdot"></span>'+item.trader+' · '+item.location+'</div></div><div class="pright"><div class="pval">₦'+Number(item.price).toLocaleString()+'</div><span class="pbadge stable">Stable</span></div></div>';
    }).join('');
  } catch(e) {
    showToast('Fatal error: '+e.message);
  }
}
</script>

<script>
var initTimer = setInterval(function() {
  if (window.supabase) {
    clearInterval(initTimer);
    initDB();
  }
}, 100);
</script>
</body>
</html>
